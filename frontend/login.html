<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to your PrepBuddy account.">
    <title>PrepBuddy - Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-brand">
                    <div class="auth-logo"><i class="fa-solid fa-graduation-cap"></i></div>
                    <span class="auth-brand-name">PrepBuddy</span>
                </div>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to resume Socratic interview training</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" required placeholder="name@example.com" autocomplete="email">
                </div>
                <div class="form-group" style="margin-bottom: 0.75rem;">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary auth-submit-btn">Sign In</button>
            </form>
            
            <div class="auth-redirect">
                Don't have an account? <a href="register.html">Create an Account</a>
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="js/auth.js"></script>
</body>
</html>
