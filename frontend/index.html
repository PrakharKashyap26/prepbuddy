<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepBuddy</title>
    <script>
        // Client-side authentication dispatcher
        const token = localStorage.getItem("prepbuddy_token");
        if (token) {
            window.location.href = "dashboard.html";
        } else {
            window.location.href = "login.html";
        }
    </script>
</head>
<body>
    <div style="font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #0F172A; color: #F8FAFC;">
        <p>Loading PrepBuddy workspace...</p>
    </div>
</body>
</html>
